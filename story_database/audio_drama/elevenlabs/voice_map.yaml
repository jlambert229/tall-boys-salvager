# ElevenLabs Text-to-Dialogue (eleven_v3) voice routing for Salvager Chapter 1.
# Replace every elevenlabs_voice_id with a real ID from the ElevenLabs dashboard (Voice Lab → Add to list → copy ID).

elevenlabs:
  # Text-to-Dialogue API: only eleven_v3. See README.md.
  model_id: eleven_v3
  max_chars_per_request: 2000
  # Optional seed for reproducibility (integer). Omit or null to let the API vary.
  seed: null
  # Per-request voice settings (if your client supports DialogueInput settings; SDK may vary).
  default_voice_settings:
    stability: 0.45
    similarity_boost: 0.75
    style: 0.0
    use_speaker_boost: true

voices:
  # Full persona briefs: ../voice_profiles.yaml (character_id matches keys below where named).
  # Bam spoken lines (aloud to Sketch, Iton in room, mutter, canopy line).
  bam:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID
    notes: "character_id bameron_kold: alley banter, muttered rules, canopy closer; conversational mid, joke armor."

  # Internal monologue: same actor as bam is typical; use a second clone if you want contrast.
  bam_interior:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID_OR_SAME_AS_BAM
    notes: "character_id bameron_kold interior lane: [quietly] / [thoughtful] optional; softer on death, Iton, boots ethics."

  sketch:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID
    notes: "character_id sketch: precise, tinny when shadowed; deadpan not cartoon; lower stability if too smooth."

  uncle_iton:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID
    notes: "character_id uncle_iton: elder storyteller, cough as stage beat; silence after Capian question."

  tommy:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID
    notes: "character_id tommy: child boy; one scripted interrupt; giggles stifled with Samantha."

  samantha:
    elevenlabs_voice_id: REPLACE_WITH_VOICE_UUID
    notes: "character_id samantha: child girl; walla laughs distinct from Tommy; no solo line in ch1 script."
